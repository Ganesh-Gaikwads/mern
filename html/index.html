<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Html</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- heading tags h1 to h6 -->
  <h1>Ganesh Gaikwad</h1>
  <h6>Ganesh Gaikwad </h6>

  <!-- paragraph tag  -->
  <p><b>system</b> beats motivation, show up daily, result compound same as <b>gym</b></p>


  <!-- html list tags -->
  <h4>Order List</h4>
  <ul>
    <li>Eat</li>
    <li>Code</li>
    <li>Sleep</li>
  </ul>


  <h4>Unorder </h4>

  <ol type="A"> <!--change type of order list -->
    <li><b>Eat</b></li>
    <li><i>Code</i></li>
    <li><u>Sleep</u></li>
  </ol>


  <!-- Achor tag - used to add links to your page -->
  <a href="https://www.youtube.com/"> Youtube</a>
  <!-- absolute link-> hosted on internet -->
  <!-- relative link-> file location or system files -->





  <!-- Image Element -> absolute and relative-->
  <h2>Image Element</h2>
  <img
    src="https://cdn.dribbble.com/userupload/17547171/file/original-df1a58f8cdf28899b71bb6dc096863e6.png?resize=1504x1128&vertical=center"
    height="180px" width="200px" alt="radom image">

  <br>
  <br>

  <hr>





</body>

</html>
